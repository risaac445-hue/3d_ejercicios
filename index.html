<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Municipio AR - Postal 3D</title>
    <!-- Librerías necesarias -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        
        .info {
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 20px;
            font-size: 14px;
            z-index: 10;
            pointer-events: none;
            border-radius: 10px;
            margin: 0 15px;
            backdrop-filter: blur(5px);
        }
        
        .title {
            position: absolute;
            top: 20px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 10px;
            font-size: 18px;
            font-weight: bold;
            z-index: 10;
            pointer-events: none;
        }
        
        .instructions {
            position: absolute;
            top: 80px;
            left: 0;
            right: 0;
            text-align: center;
            background: rgba(0,0,0,0.5);
            color: #ffcc00;
            padding: 8px;
            font-size: 12px;
            z-index: 10;
            pointer-events: none;
        }
        
        .marcador-link {
            color: #4CAF50;
            text-decoration: none;
            font-weight: bold;
            pointer-events: auto;
        }
        
        @media (max-width: 600px) {
            .title { font-size: 14px; top: 10px; }
            .info { font-size: 11px; bottom: 10px; }
            .instructions { font-size: 10px; top: 70px; }
        }
    </style>
</head>
<body>
    <div class="title">
        🏔️ MUNICIPIO EN 3D | Realidad Aumentada
    </div>
    
    <div class="instructions">
        📌 Apunta la cámara al marcador
    </div>

    <!-- Escena AR -->
    <a-scene 
        embedded
        arjs="debugUIEnabled: false; sourceType: webcam; trackingMethod: best;"
        vr-mode-ui="enabled: false"
    >
        
        <!-- Marcador HIRO (el que viene por defecto) -->
        <a-marker preset="hiro">
            <!-- Modelo 3D del municipio -->
            <a-entity 
                gltf-model="m1_v1_vdeep.glb"
                scale="0.5 0.5 0.5"
                position="0 0 0"
                rotation="-90 0 0">
            </a-entity>
        </a-marker>

        <!-- Cámara -->
        <a-entity camera></a-entity>
        
        <!-- Luz ambiental para que se vea bien el modelo -->
        <a-light type="ambient" intensity="0.8"></a-light>
        <a-light type="directional" intensity="1.0" position="1 2 1"></a-light>
        
    </a-scene>

    <div class="info">
        📍 Usa el marcador HIRO | 
        <a href="https://raw.githubusercontent.com/AR-js-org/AR.js/master/aframe/examples/hiro.png" target="_blank" class="marcador-link">
            🔽 DESCARGAR MARCADOR
        </a>
        <br>
        <small>Imprime el marcador o muéstralo en otra pantalla</small>
    </div>
</body>
</html>
