<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🗺️ Depuración - Mapa 3D</title>
    <style>
        /* ========== ESTILOS BASE (los que ya funcionaban) ========== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', 'Arial Rounded MT Bold', Arial, sans-serif;
        }

        :root { --full-h: 100vh; }
        @supports (height: 100dvh) { :root { --full-h: 100dvh; } }

        a-scene {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important;
            height: var(--full-h) !important;
            z-index: 0 !important;
        }
        a-scene canvas {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important;
            height: var(--full-h) !important;
        }

        #ui-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: var(--full-h);
            pointer-events: none;
            z-index: 100;
        }

        /* Pantalla de carga */
        #loading-screen {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; padding: 32px; text-align: center;
            z-index: 300;
            transition: opacity 0.6s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        .stars-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .star {
            position: absolute; width: 4px; height: 4px;
            background: white; border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.5); }
        }
        .load-emoji { font-size: 72px; animation: bounce 1s infinite alternate; filter: drop-shadow(0 0 18px rgba(255,220,50,0.7)); }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-14px); } }
        .load-title { font-size: 28px; font-weight: 900; color: #ffe066; text-shadow: 0 0 22px rgba(255,224,102,0.6); }
        .load-subtitle { font-size: 17px; color: #a8d8ea; line-height: 1.7; }
        .loader-bar-wrap { width: min(280px, 80vw); height: 14px; background: rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; }
        .loader-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffe066, #ff9a3c); border-radius: 20px; animation: fill-bar 7s ease-out forwards; }
        @keyframes fill-bar { 0% { width: 5%; } 30% { width: 40%; } 70% { width: 80%; } 100% { width: 95%; } }

        /* Barra de estado */
        #info-bar {
            position: absolute; top: 18px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 22px; border-radius: 40px;
            font-size: 17px; font-weight: 700; color: white;
            white-space: nowrap; pointer-events: none;
            background: rgba(15,15,40,0.78);
            border: 2px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
            transition: background 0.4s, border-color 0.4s;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        #info-bar.found { background: rgba(20,160,80,0.88); border-color: rgba(100,255,150,0.5); }
        #info-bar.lost  { background: rgba(180,80,20,0.82); border-color: rgba(255,160,60,0.5); }

        /* Instrucciones */
        #instruction-box {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none; text-align: center;
            transition: opacity 0.5s ease;
        }
        .inst-bubble {
            display: inline-block;
            background: rgba(255,255,255,0.93);
            color: #222; padding: 14px 24px; border-radius: 24px;
            font-size: 16px; font-weight: 600; line-height: 1.7;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            border: 3px solid #ffe066;
        }
        .inst-bubble .big-icon { display: block; font-size: 36px; margin-bottom: 4px; animation: pulse-icon 1.4s infinite alternate; }
        @keyframes pulse-icon { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Panel de depuración */
        #debug-panel {
            position: fixed;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(4px);
            color: #0f0;
            font-family: monospace;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 500;
            pointer-events: none;
            border-left: 4px solid #ffaa44;
            max-width: 85%;
            text-shadow: none;
            line-height: 1.4;
            word-break: break-word;
        }

        /* Error adicional */
        #error-screen {
            display: none; position: fixed; inset: 0;
            background: linear-gradient(160deg, #2d0a0a, #4a1010);
            flex-direction: column; align-items: center;
            justify-content: center; gap: 16px;
            z-index: 400; padding: 32px; text-align: center;
        }
        #error-screen.visible { display: flex; }
        #error-screen .err-icon { font-size: 64px; }
        #error-screen h2 { font-size: 24px; color: #ff8a8a; font-weight: 900; }
        #error-screen p  { font-size: 16px; color: #ffcccc; line-height: 1.7; max-width: 360px; }

        /* Botón de reinicio */
        #reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            border-radius: 40px;
            padding: 10px 18px;
            color: #ffdd99;
            font-weight: bold;
            font-size: 14px;
            pointer-events: auto;
            cursor: pointer;
            z-index: 200;
            display: none;
            font-family: inherit;
        }
        #reset-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="info-bar">📸 ¡Apunta a la postal!</div>
    <div id="instruction-box">
        <div class="inst-bubble">
            <span class="big-icon">🗺️</span>
            Mueve el dispositivo hacia<br>la <strong>tarjeta postal</strong>
        </div>
    </div>
</div>

<div id="loading-screen">
    <div class="stars-bg" id="stars-bg"></div>
    <div class="load-emoji">🔍</div>
    <div class="load-title">Depuración Activa</div>
    <div class="load-subtitle">Cargando modelo...<br>Revisa el panel verde abajo a la izquierda</div>
    <div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div>
</div>

<div id="error-screen">
    <div class="err-icon">😢</div>
    <h2>¡Error crítico!</h2>
    <p id="error-msg">No se pudo cargar el modelo 3D.<br>Mira el panel de depuración.</p>
</div>

<button id="reset-btn">🔄 Reintentar</button>

<div id="debug-panel">🟡 Inicializando...</div>

<!-- DETECCIÓN WEBGL + ESTRELLAS -->
<script>
(function () {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('error-screen').classList.add('visible');
        document.getElementById('error-msg').innerHTML = 'WebGL no soportado. Actualiza tu navegador.';
        throw new Error('Sin WebGL');
    }
    var bg = document.getElementById('stars-bg');
    for (var i = 0; i < 60; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;'
            + 'animation-delay:' + (Math.random()*2) + 's;'
            + 'animation-duration:' + (1.5 + Math.random()) + 's;';
        bg.appendChild(s);
    }
})();
</script>

<!-- LIBRERÍAS -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<!-- ESCENA AR (SIN embedded, para cámara funcional) -->
<a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.01; warmupTolerance: 10; missTolerance: 10;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; antialias: false;"
>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
        <!-- CUBO DE PRUEBA (verde semitransparente) para saber si el tracking funciona -->
        <a-box color="#00ff88" opacity="0.6" width="0.2" height="0.02" depth="0.2" position="0 0.01 0"></a-box>

        <!-- MODELO GLTF (con escala y posición ajustables) -->
        <a-gltf-model
            id="modelo-3d"
            src="./malla3d.gltf"
            scale="10 10 10"
            position="0 1.5 0"
            rotation="-90 0 0"
        ></a-gltf-model>

        <!-- Luces para que se vea el relieve -->
        <a-light type="directional" intensity="1.5" position="1 2 1" color="#fff5e0"></a-light>
        <a-light type="ambient" intensity="0.8" color="#ffffff"></a-light>
        <a-light type="directional" intensity="0.5" position="-1 -1 0.5" color="#aaccff"></a-light>
    </a-entity>
</a-scene>

<!-- SISTEMA DE DEPURACIÓN COMPLETO -->
<script>
(function () {
    const debugDiv = document.getElementById('debug-panel');
    const loadingScreen = document.getElementById('loading-screen');
    const infoBar = document.getElementById('info-bar');
    const instructBox = document.getElementById('instruction-box');
    const errorScreen = document.getElementById('error-screen');
    const errorMsg = document.getElementById('error-msg');
    const resetBtn = document.getElementById('reset-btn');

    let modelLoaded = false;
    let targetDetected = false;
    let loadAttempts = 0;

    function updateDebug(text, isError = false) {
        const prefix = isError ? '❌ ' : (modelLoaded ? '✅ ' : '🟡 ');
        debugDiv.innerHTML = prefix + text + '<br>' + new Date().toLocaleTimeString();
        if (isError) {
            debugDiv.style.borderLeftColor = '#ff4444';
            debugDiv.style.color = '#ffaa88';
        } else {
            debugDiv.style.borderLeftColor = '#ffaa44';
            debugDiv.style.color = '#aaffaa';
        }
        console.log('[DEBUG]', text);
    }

    // --- Detectar errores de carga del modelo ---
    const modelEl = document.getElementById('modelo-3d');
    if (!modelEl) {
        updateDebug('ERROR: No se encontró el elemento a-gltf-model', true);
        errorScreen.classList.add('visible');
        loadingScreen.classList.add('hidden');
        return;
    }

    modelEl.addEventListener('model-loaded', () => {
        modelLoaded = true;
        updateDebug('Modelo cargado correctamente (GLTF)');
        loadingScreen.classList.add('hidden');
        // Opcional: ocultar loading si ya estaba
    });

    modelEl.addEventListener('model-error', (ev) => {
        const detail = ev.detail || {};
        let msg = detail.message || detail.src || 'Error desconocido al cargar el modelo';
        updateDebug(`ERROR al cargar modelo: ${msg}`, true);
        errorScreen.classList.add('visible');
        loadingScreen.classList.add('hidden');
        errorMsg.innerHTML = `No se pudo cargar el modelo 3D.<br>Detalle: ${msg}<br>Verifica que el archivo .gltf y .bin existan.`;
        // Mostrar botón de reintento
        resetBtn.style.display = 'block';
    });

    // Timeout de carga (por si no se dispara error pero tampoco carga)
    setTimeout(() => {
        if (!modelLoaded) {
            updateDebug('ADVERTENCIA: El modelo no terminó de cargar en 12 segundos', true);
            // No mostramos error fatal aún, solo advertencia
            debugDiv.style.borderLeftColor = '#ffaa44';
            debugDiv.style.color = '#ffcc88';
        }
    }, 12000);

    // --- Detección del target ---
    let firstFound = true;
    let lostTimer = null;

    document.addEventListener('mindar-image-targetFound', () => {
        targetDetected = true;
        updateDebug('Target detectado ✓');
        infoBar.textContent = '✅ ¡Postal encontrada!';
        infoBar.className = 'found';
        instructBox.style.opacity = '0';
        resetBtn.style.display = 'none';
        if (firstFound) {
            firstFound = false;
            // Mostrar celebración visual (opcional)
            const celebrationDiv = document.createElement('div');
            celebrationDiv.id = 'temp-celebration';
            celebrationDiv.textContent = '🎉 ¡Objeto detectado! 🎉';
            celebrationDiv.style.position = 'fixed';
            celebrationDiv.style.top = '50%';
            celebrationDiv.style.left = '50%';
            celebrationDiv.style.transform = 'translate(-50%, -50%)';
            celebrationDiv.style.background = 'rgba(0,0,0,0.7)';
            celebrationDiv.style.color = '#ffdd88';
            celebrationDiv.style.padding = '16px 28px';
            celebrationDiv.style.borderRadius = '60px';
            celebrationDiv.style.fontSize = '24px';
            celebrationDiv.style.fontWeight = 'bold';
            celebrationDiv.style.zIndex = '250';
            celebrationDiv.style.pointerEvents = 'none';
            celebrationDiv.style.backdropFilter = 'blur(12px)';
            document.body.appendChild(celebrationDiv);
            setTimeout(() => celebrationDiv.remove(), 2000);
        }
    });

    document.addEventListener('mindar-image-targetLost', () => {
        targetDetected = false;
        updateDebug('Target perdido');
        infoBar.textContent = '🔍 Buscando la postal...';
        infoBar.className = 'lost';
        clearTimeout(lostTimer);
        lostTimer = setTimeout(() => {
            if (!targetDetected) {
                updateDebug('Consejo: Asegúrate de que la postal esté bien iluminada y sin reflejos');
                infoBar.textContent = '📸 ¡Apunta a la postal!';
                infoBar.className = '';
                instructBox.style.opacity = '1';
                // Mostrar botón de reinicio si el tracking no vuelve
                resetBtn.style.display = 'block';
            }
        }, 8000);
    });

    // --- Botón de reinicio (reinicia MindAR) ---
    resetBtn.addEventListener('click', () => {
        const scene = document.querySelector('a-scene');
        const mindar = scene?.components['mindar-image'];
        if (mindar && mindar.restartTracker) {
            mindar.restartTracker();
            updateDebug('Reiniciando tracker...');
            resetBtn.style.display = 'none';
            infoBar.textContent = '🔄 Reiniciando...';
            setTimeout(() => {
                if (!targetDetected) infoBar.textContent = '📸 ¡Apunta a la postal!';
            }, 1500);
        } else {
            window.location.reload();
        }
    });

    // --- Detectar si el modelo tiene texturas o bin externo (consejo) ---
    fetch('./malla3d.gltf', { method: 'HEAD' }).then(resp => {
        if (!resp.ok) {
            updateDebug(`Archivo malla3d.gltf no encontrado (HTTP ${resp.status})`, true);
            errorScreen.classList.add('visible');
            loadingScreen.classList.add('hidden');
            errorMsg.innerHTML = 'No se encuentra el archivo malla3d.gltf.<br>Asegúrate de que está en la misma carpeta.';
        } else {
            updateDebug('Archivo GLTF accesible');
        }
    }).catch(err => {
        updateDebug(`Error al verificar existencia de GLTF: ${err.message}`, true);
    });

    // Consejo adicional: verificar si hay .bin
    setTimeout(() => {
        if (!modelLoaded) {
            updateDebug('Sugerencia: Si tu modelo tiene dependencias (.bin), súbelas también.', false);
        }
    }, 4000);
})();
</script>

</body>
</html>
