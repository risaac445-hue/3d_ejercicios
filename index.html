<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🗺️ Mapa Mágico 3D - Terreno Real</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: 'Segoe UI', 'Arial Rounded MT Bold', Arial, sans-serif;
        }

        :root { --full-h: 100vh; }
        @supports (height: 100dvh) { :root { --full-h: 100dvh; } }

        a-scene {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important;
            height: var(--full-h) !important;
            z-index: 0 !important;
        }
        a-scene canvas {
            position: fixed !important;
            top: 0 !important; left: 0 !important;
            width: 100vw !important;
            height: var(--full-h) !important;
        }

        #ui-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw;
            height: var(--full-h);
            pointer-events: none;
            z-index: 100;
        }

        /* Pantalla de carga */
        #loading-screen {
            position: fixed; inset: 0;
            background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 20px; padding: 32px; text-align: center;
            z-index: 300;
            transition: opacity 0.6s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        .stars-bg { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }
        .star {
            position: absolute; width: 4px; height: 4px;
            background: white; border-radius: 50%;
            animation: twinkle 2s infinite alternate;
        }
        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(1); }
            to   { opacity: 1;   transform: scale(1.5); }
        }
        .load-emoji { font-size: 72px; animation: bounce 1s infinite alternate; filter: drop-shadow(0 0 18px rgba(255,220,50,0.7)); }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-14px); } }
        .load-title { font-size: 28px; font-weight: 900; color: #ffe066; text-shadow: 0 0 22px rgba(255,224,102,0.6); }
        .load-subtitle { font-size: 17px; color: #a8d8ea; line-height: 1.7; }
        .loader-bar-wrap { width: min(280px, 80vw); height: 14px; background: rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; }
        .loader-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #ffe066, #ff9a3c); border-radius: 20px; animation: fill-bar 7s ease-out forwards; }
        @keyframes fill-bar { 0% { width: 5%; } 30% { width: 40%; } 70% { width: 80%; } 100% { width: 95%; } }

        /* Barra de estado */
        #info-bar {
            position: absolute; top: 18px; left: 50%;
            transform: translateX(-50%);
            padding: 12px 22px; border-radius: 40px;
            font-size: 17px; font-weight: 700; color: white;
            white-space: nowrap; pointer-events: none;
            background: rgba(15,15,40,0.78);
            border: 2px solid rgba(255,255,255,0.18);
            backdrop-filter: blur(8px);
            transition: background 0.4s, border-color 0.4s;
            text-shadow: 0 1px 4px rgba(0,0,0,0.5);
        }
        #info-bar.found { background: rgba(20,160,80,0.88); border-color: rgba(100,255,150,0.5); }
        #info-bar.lost  { background: rgba(180,80,20,0.82); border-color: rgba(255,160,60,0.5); }

        /* Instrucciones */
        #instruction-box {
            position: absolute; bottom: 40px; left: 50%;
            transform: translateX(-50%);
            pointer-events: none; text-align: center;
            transition: opacity 0.5s ease;
        }
        .inst-bubble {
            display: inline-block;
            background: rgba(255,255,255,0.93);
            color: #222; padding: 14px 24px; border-radius: 24px;
            font-size: 16px; font-weight: 600; line-height: 1.7;
            box-shadow: 0 4px 20px rgba(0,0,0,0.35);
            border: 3px solid #ffe066;
        }
        .inst-bubble .big-icon { display: block; font-size: 36px; margin-bottom: 4px; animation: pulse-icon 1.4s infinite alternate; }
        @keyframes pulse-icon { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* Celebración */
        #celebration {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%,-50%) scale(0);
            pointer-events: none; text-align: center;
        }
        #celebration.show { animation: cele-pop 0.5s ease forwards; }
        @keyframes cele-pop {
            0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 0; }
            60%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
            100% { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
        }
        .cele-text { font-size: 36px; font-weight: 900; color: #ffe066; text-shadow: 0 0 30px rgba(255,200,0,0.9), 2px 2px 0 #c47a00; }

        /* Error */
        #error-screen {
            display: none; position: fixed; inset: 0;
            background: linear-gradient(160deg, #2d0a0a, #4a1010);
            flex-direction: column; align-items: center;
            justify-content: center; gap: 16px;
            z-index: 400; padding: 32px; text-align: center;
        }
        #error-screen.visible { display: flex; }
        #error-screen .err-icon { font-size: 64px; }
        #error-screen h2 { font-size: 24px; color: #ff8a8a; font-weight: 900; }
        #error-screen p  { font-size: 16px; color: #ffcccc; line-height: 1.7; max-width: 360px; }

        /* Botón de reinicio (solo aparece si se pierde el tracking) */
        #reset-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            border: 1px solid #ffaa44;
            border-radius: 40px;
            padding: 10px 18px;
            color: #ffdd99;
            font-weight: bold;
            font-size: 14px;
            pointer-events: auto;
            cursor: pointer;
            z-index: 200;
            display: none;
            font-family: inherit;
        }
        #reset-btn:active { transform: scale(0.96); }
    </style>
</head>
<body>

<div id="ui-overlay">
    <div id="info-bar">📸 ¡Apunta a la postal!</div>
    <div id="instruction-box">
        <div class="inst-bubble">
            <span class="big-icon">🗺️</span>
            Mueve el dispositivo hacia<br>la <strong>tarjeta postal</strong>
        </div>
    </div>
    <div id="celebration">
        <div class="cele-text">🎉 ¡Lo encontraste! 🎉</div>
    </div>
</div>

<div id="loading-screen">
    <div class="stars-bg" id="stars-bg"></div>
    <div class="load-emoji">🌄</div>
    <div class="load-title">Terreno 3D</div>
    <div class="load-subtitle">Cargando el modelo de tu municipio...<br>Prepara la postal</div>
    <div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div>
</div>

<div id="error-screen">
    <div class="err-icon">😢</div>
    <h2>¡Ups! Algo salió mal</h2>
    <p id="error-msg">Este dispositivo no puede mostrar la magia 3D.<br>Usa <strong>Chrome o Edge</strong> actualizado.</p>
</div>

<button id="reset-btn">🔄 Reintentar búsqueda</button>

<!-- DETECCIÓN WEBGL + ESTRELLAS -->
<script>
(function () {
    var c = document.createElement('canvas');
    var gl = c.getContext('webgl') || c.getContext('experimental-webgl');
    if (!gl) {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('error-screen').classList.add('visible');
        throw new Error('Sin WebGL');
    }
    var bg = document.getElementById('stars-bg');
    for (var i = 0; i < 60; i++) {
        var s = document.createElement('div');
        s.className = 'star';
        s.style.cssText = 'left:' + (Math.random()*100) + '%;top:' + (Math.random()*100) + '%;'
            + 'animation-delay:' + (Math.random()*2) + 's;'
            + 'animation-duration:' + (1.5 + Math.random()) + 's;';
        bg.appendChild(s);
    }
})();
</script>

<!-- LIBRERÍAS -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<!-- COMPONENTE para colorear el terreno (GLTF de QGIS sin material visible) -->
<script>
AFRAME.registerComponent('terrain-color', {
    init: function() {
        var el = this.el;
        el.addEventListener('model-loaded', function () {
            var obj = el.getObject3D('mesh');
            if (!obj) return;
            obj.traverse(function(node) {
                if (node.isMesh) {
                    // Color marrón-verde tipo terreno
                    node.material = new THREE.MeshStandardMaterial({
                        color: 0x8faa6b,
                        roughness: 0.7,
                        metalness: 0.1,
                        side: THREE.DoubleSide
                    });
                    node.castShadow = true;
                }
            });
        });
    }
});
</script>

<!-- ESCENA AR - SIN "embedded" (para que la cámara funcione en Safari) -->
<a-scene
    mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1; filterMinCF: 0.0001; filterBeta: 0.01; warmupTolerance: 10; missTolerance: 10;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    renderer="colorManagement: true; antialias: false;"
>
    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
        <!-- TU NUEVA MALLA (solo superficie, sin cubo, 5.24 MB) -->
        <a-gltf-model
            id="modelo-3d"
            src="./malla3d.gltf"
            scale="0.05 0.05 0.05"
            position="0 0.04 0"
            rotation="-90 0 0"
            terrain-color
        ></a-gltf-model>

        <!-- Luces para que se vea el relieve -->
        <a-light type="directional" intensity="1.5" position="1 2 1" color="#fff5e0"></a-light>
        <a-light type="ambient" intensity="0.8" color="#ffffff"></a-light>
        <a-light type="directional" intensity="0.5" position="-1 -1 0.5" color="#aaccff"></a-light>
    </a-entity>
</a-scene>

<!-- LÓGICA UI y tracking -->
<script>
(function () {
    var infoBar       = document.getElementById('info-bar');
    var loadingScreen = document.getElementById('loading-screen');
    var instructBox   = document.getElementById('instruction-box');
    var celebration   = document.getElementById('celebration');
    var errorScreen   = document.getElementById('error-screen');
    var errorMsg      = document.getElementById('error-msg');
    var resetBtn      = document.getElementById('reset-btn');
    var scene         = document.querySelector('a-scene');

    var modelLoaded = false;
    var targetFound = false;
    var firstFound  = true;

    scene.addEventListener('webglcontextlost', function () {
        errorMsg.innerHTML = 'La magia 3D se interrumpió 😔<br>Cierra otras apps e inténtalo de nuevo.';
        errorScreen.classList.add('visible');
        loadingScreen.classList.add('hidden');
    });

    // Esperar a que cargue el modelo GLTF
    var interval = setInterval(function () {
        var el = document.getElementById('modelo-3d');
        if (el && el.hasLoaded) {
            modelLoaded = true;
            clearInterval(interval);
            hideCarga();
        }
    }, 500);
    setTimeout(function () {
        if (!modelLoaded) {
            modelLoaded = true;
            clearInterval(interval);
            hideCarga();
        }
    }, 8000);
    function hideCarga() {
        setTimeout(function () { loadingScreen.classList.add('hidden'); }, 600);
    }

    // Target encontrado
    document.addEventListener('mindar-image-targetFound', function () {
        targetFound = true;
        infoBar.textContent = '✅ ¡Postal encontrada!';
        infoBar.className = 'found';
        instructBox.style.opacity = '0';
        resetBtn.style.display = 'none';
        if (firstFound) {
            firstFound = false;
            celebration.classList.add('show');
            setTimeout(function () {
                celebration.classList.remove('show');
            }, 2500);
        }
    });

    // Target perdido
    var lostTimer = null;
    document.addEventListener('mindar-image-targetLost', function () {
        targetFound = false;
        infoBar.textContent = '🔍 Buscando la postal...';
        infoBar.className = 'lost';
        clearTimeout(lostTimer);
        lostTimer = setTimeout(function () {
            if (!targetFound) {
                infoBar.textContent = '📸 ¡Apunta a la postal!';
                infoBar.className = '';
                instructBox.style.opacity = '1';
                instructBox.querySelector('.inst-bubble').innerHTML =
                    '<span class="big-icon">💡</span>' +
                    'Consejos:<br>✔ Buena luz<br>✔ Ve toda la postal<br>✔ Sin reflejos';
                resetBtn.style.display = 'block';
            }
        }, 8000);
    });

    // Botón de reinicio: fuerza recarga del tracker
    resetBtn.addEventListener('click', function () {
        var mindar = scene.components['mindar-image'];
        if (mindar && mindar.restartTracker) {
            mindar.restartTracker();
            infoBar.textContent = '🔄 Reiniciando...';
            resetBtn.style.display = 'none';
            setTimeout(function () {
                if (!targetFound) infoBar.textContent = '📸 ¡Apunta a la postal!';
            }, 1500);
        } else {
            window.location.reload();
        }
    });
})();
</script>

</body>
</html>
