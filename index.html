<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diagnóstico de Carga</title>
    <style>
        body { margin: 0; background: #222; color: white; font-family: monospace; padding: 20px; }
        #log { background: #111; padding: 15px; border-radius: 8px; max-height: 400px; overflow-y: auto; }
        .success { color: #4f4; }
        .error { color: #f44; }
        .info { color: #4af; }
        canvas { display: block; margin-top: 20px; border: 1px solid #444; }
    </style>
</head>
<body>
    <h2>🔍 Diagnóstico de Carga del Modelo</h2>
    <div id="log"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const logElement = document.getElementById('log');
        
        function log(msg, type = 'info') {
            const p = document.createElement('p');
            p.className = type;
            p.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
            logElement.appendChild(p);
            console.log(msg);
        }

        log('🚀 Iniciando diagnóstico...', 'info');
        
        // Verificar URL
        const urlParams = new URLSearchParams(window.location.search);
        const modeloNombre = urlParams.get('modelo') || 'm1_v1_vdeep.glb';
        log(`📁 Modelo solicitado: "${modeloNombre}"`, 'info');
        log(`🔗 URL completa: ${window.location.href}`, 'info');

        // Escena simple para prueba
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / 400, 0.1, 100);
        camera.position.set(3, 2, 5);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, 400);
        document.body.appendChild(renderer.domElement);

        // Luces básicas
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(5, 10, 5);
        scene.add(dirLight);

        // Rejilla de referencia
        const gridHelper = new THREE.GridHelper(10, 10, 0x666666, 0x444444);
        scene.add(gridHelper);

        // Intentar cargar
        const loader = new GLTFLoader();
        log('📡 Intentando fetch del archivo...', 'info');
        
        // Primero verificar si el archivo existe con fetch
        fetch(modeloNombre)
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                log(`✅ Archivo encontrado (${response.headers.get('content-length') || '?'} bytes)`, 'success');
                log(`📋 Content-Type: ${response.headers.get('content-type')}`, 'info');
                
                // Ahora cargar con GLTFLoader
                log('🔄 Iniciando parseo GLB...', 'info');
                return new Promise((resolve, reject) => {
                    loader.load(
                        modeloNombre,
                        (gltf) => {
                            log('✅ Modelo GLB parseado correctamente', 'success');
                            resolve(gltf);
                        },
                        (progress) => {
                            const pct = progress.total > 0 ? Math.round(progress.loaded / progress.total * 100) : 0;
                            log(`📊 Progreso: ${pct}%`, 'info');
                        },
                        (error) => {
                            log(`❌ Error en GLTFLoader: ${error.message}`, 'error');
                            reject(error);
                        }
                    );
                });
            })
            .then(gltf => {
                const model = gltf.scene;
                log(`📦 Objetos en la escena: ${model.children.length}`, 'info');
                
                // Mostrar jerarquía
                model.traverse(node => {
                    if (node.isMesh) {
                        log(`🔷 Mesh: "${node.name}" - Geometría: ${node.geometry.type}`, 'info');
                    }
                });

                // Centrar modelo
                const box = new THREE.Box3().setFromObject(model);
                const size = box.getSize(new THREE.Vector3());
                const center = box.getCenter(new THREE.Vector3());
                
                log(`📏 Dimensiones: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}`, 'info');
                log(`📍 Centro: ${center.x.toFixed(2)}, ${center.y.toFixed(2)}, ${center.z.toFixed(2)}`, 'info');
                
                const scale = 3 / Math.max(size.x, size.y, size.z);
                model.scale.setScalar(scale);
                model.position.set(-center.x * scale, -center.y * scale, -center.z * scale);
                
                scene.add(model);
                log('✅ Modelo agregado a la escena', 'success');
            })
            .catch(error => {
                log(`💥 Error fatal: ${error.message}`, 'error');
                // Crear cubo de error visual
                const geo = new THREE.BoxGeometry(1, 1, 1);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff0000 });
                const cube = new THREE.Mesh(geo, mat);
                cube.position.y = 0.5;
                scene.add(cube);
                log('🔴 Se agregó cubo rojo como indicador de error', 'error');
            });

        // Animación
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
        log('🎬 Animación iniciada', 'info');
    </script>
</body>
</html>
