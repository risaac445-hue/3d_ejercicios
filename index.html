<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR - Tarjeta Postal 3D</title>
    
    <!-- Estilos para la interfaz -->
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
            background: #000;
        }
        
        /* Contenedor de la cámara y AR */
        #ar-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        /* Indicador superior */
        #info-bar {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 16px;
            z-index: 100;
            pointer-events: none;
            backdrop-filter: blur(10px);
            transition: all 0.5s ease;
            text-align: center;
        }
        
        /* Estado: encontrado */
        #info-bar.found {
            background: rgba(0, 200, 100, 0.7);
        }
        
        /* Pantalla de carga */
        #loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            transition: opacity 0.5s ease;
        }
        
        #loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .loader-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-top: 5px solid #00c864;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loader-text {
            color: white;
            font-size: 18px;
            text-align: center;
        }
        
        /* Botón de ayuda */
        #help-btn {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.5);
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 100;
            cursor: pointer;
            backdrop-filter: blur(5px);
        }
        
        /* Instrucción flotante */
        #instruction {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 14px;
            opacity: 0.7;
            z-index: 100;
            pointer-events: none;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Contenedor de AR -->
    <div id="ar-container"></div>
    
    <!-- Mensaje superior -->
    <div id="info-bar">📸 Apunta la cámara a la postal</div>
    
    <!-- Instrucción -->
    <div id="instruction">Mueve lentamente tu teléfono<br>alrededor de la tarjeta postal</div>
    
    <!-- Pantalla de carga -->
    <div id="loading-screen">
        <div class="loader-spinner"></div>
        <div class="loader-text" id="loading-text">Cargando experiencia AR...</div>
    </div>

    <!-- ============================================ -->
    <!-- CARGAR LIBRERÍAS DESDE CDN (sin instalación) -->
    <!-- ============================================ -->
    
    <!-- 1. A-Frame (framework VR/AR) -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    
    <!-- 2. MindAR para tracking de imagen -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <!-- 3. Componente para cargar modelos GLB en MindAR -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-gltf-aframe.prod.js"></script>

    <!-- ============================================ -->
    <!-- ESCENA AR -->
    <!-- ============================================ -->
    <a-scene 
        mindar-image="
            imageTargetSrc: ./targets.mind;
            maxTrack: 1;
            filterMinCF: 0.0001;
            filterBeta: 0.01;
            warmupTolerance: 10;
            missTolerance: 10;
        " 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false"
        renderer="colorManagement: true; antialias: true;"
        embedded
    >
        <!-- Cámara -->
        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>
        
        <!-- ======================================== -->
        <!-- ANCLA: Aquí aparece el modelo 3D -->
        <!-- ======================================== -->
        <!-- 
            mindar-image-target: vincula a la imagen trackeada
            targetIndex: 0 = primera (y única) imagen en targets.mind
        -->
        <a-entity mindar-image-target="targetIndex: 0">
            
            <!-- MODELO 3D cargado desde GLB -->
            <!-- Ajusta scale, position y rotation según necesites -->
            <a-gltf-model 
                id="modelo-3d"
                src="./m1_v1_vdeep.glb"
                scale="0.5 0.5 0.5"
                position="0 0 0.1"
                rotation="0 0 0"
                animation-mixer=""
            ></a-gltf-model>
            
            <!-- Luz que ilumina el modelo -->
            <a-light 
                type="directional" 
                intensity="1.5" 
                position="1 2 1"
                target="#modelo-3d"
            ></a-light>
            
        </a-entity>
        
        <!-- Luces ambientales -->
        <a-light type="ambient" intensity="0.8"></a-light>
        
    </a-scene>

    <!-- ============================================ -->
    <!-- LÓGICA DE INTERFAZ Y EVENTOS -->
    <!-- ============================================ -->
    <script>
        (function() {
            const infoBar = document.getElementById('info-bar');
            const loadingScreen = document.getElementById('loading-screen');
            const loadingText = document.getElementById('loading-text');
            const instruction = document.getElementById('instruction');
            
            let modelLoaded = false;
            let targetFound = false;
            let firstTimeFound = true;
            
            // === EVENTOS DE CARGA DEL MODELO ===
            document.addEventListener('DOMContentLoaded', function() {
                // Intentar detectar cuando el modelo GLB se ha cargado
                const checkModelInterval = setInterval(function() {
                    const modeloElement = document.getElementById('modelo-3d');
                    if (modeloElement && modeloElement.hasLoaded) {
                        modelLoaded = true;
                        clearInterval(checkModelInterval);
                        updateLoadingState();
                    }
                }, 500);
                
                // Timeout de seguridad
                setTimeout(function() {
                    if (!modelLoaded) {
                        loadingText.textContent = 'Modelo cargado parcialmente...';
                        modelLoaded = true;
                        updateLoadingState();
                    }
                }, 5000);
            });
            
            // === EVENTOS DE TRACKING ===
            // Cuando encuentra la imagen
            document.addEventListener('mindar-image-targetFound', function(event) {
                targetFound = true;
                
                if (firstTimeFound) {
                    firstTimeFound = false;
                    instruction.style.opacity = '0';
                }
                
                infoBar.textContent = '✅ ¡Postal encontrada!';
                infoBar.classList.add('found');
                updateLoadingState();
            });
            
            // Cuando pierde la imagen
            document.addEventListener('mindar-image-targetLost', function(event) {
                targetFound = false;
                infoBar.textContent = '🔍 Buscando postal...';
                infoBar.classList.remove('found');
            });
            
            // === CONTROL DE PANTALLA DE CARGA ===
            function updateLoadingState() {
                if (modelLoaded && targetFound) {
                    // Todo listo, ocultar pantalla de carga
                    setTimeout(function() {
                        loadingScreen.classList.add('hidden');
                    }, 800);
                } else if (modelLoaded && !targetFound) {
                    // Modelo cargado pero sin target
                    loadingText.textContent = '✅ Modelo listo\n📸 Busca la postal';
                    loadingScreen.classList.add('hidden');
                }
            }
            
            // === REINICIAR EXPERIENCIA ===
            // (útil si el tracking se pierde mucho)
            let lastLost = Date.now();
            document.addEventListener('mindar-image-targetLost', function() {
                lastLost = Date.now();
                
                // Si pasan más de 10 segundos sin encontrar, mostrar ayuda
                setTimeout(function() {
                    if (!targetFound && Date.now() - lastLost > 10000) {
                        instruction.style.opacity = '1';
                        instruction.textContent = '📌 Asegúrate de:\n- Buena iluminación\n- Ver la postal completa\n- Sin reflejos';
                    }
                }, 10000);
            });
            
        })();
    </script>
</body>
</html>
